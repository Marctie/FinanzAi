<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Movimenti</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/tabs/add-transaction" fill="clear">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Cerca transazioni..."
      (ionInput)="onSearch($event)"
      [debounce]="250"
      mode="ios">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Filtri -->
  <div class="filter-chips">
    <ion-chip [class.active]="activeFilter === 'all'"     (click)="setFilter('all')">Tutti</ion-chip>
    <ion-chip [class.active]="activeFilter === 'income'"  (click)="setFilter('income')">Entrate</ion-chip>
    <ion-chip [class.active]="activeFilter === 'expense'" (click)="setFilter('expense')">Uscite</ion-chip>
  </div>

  <!-- Totale filtrato -->
  <div class="filter-total" *ngIf="filtered.length">
    <span class="num" [class.amount-positive]="totalFiltered >= 0" [class.amount-negative]="totalFiltered < 0">
      {{ totalFiltered >= 0 ? '+' : '' }}{{ formatCurrency(totalFiltered) }}
    </span>
    <span class="filter-count">· {{ filtered.length }} movimenti</span>
  </div>

  <!-- Lista -->
  <ion-list lines="none" *ngIf="filtered.length; else empty">
    <app-transaction-card
      *ngFor="let tx of filtered; trackBy: trackById"
      [transaction]="tx"
      (deleted)="onDeleted($event)">
    </app-transaction-card>
  </ion-list>

  <ng-template #empty>
    <app-empty-state
      emoji="🔍"
      title="Nessun risultato"
      subtitle="Prova a modificare i filtri o la ricerca"
      actionLabel="Aggiungi transazione"
      actionRoute="/tabs/add-transaction">
    </app-empty-state>
  </ng-template>

  <app-footer></app-footer>
</ion-content>
