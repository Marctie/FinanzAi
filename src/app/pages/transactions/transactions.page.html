<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Movimenti</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/tabs/add-transaction" fill="clear">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Cerca transazioni..."
      (ionInput)="onSearch($event)"
      [debounce]="250"
      mode="ios">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Filtro mese -->
  <div class="filter-chips month-chips">
    <ion-chip
      *ngFor="let m of months"
      [class.active]="activeMonth === m.value"
      (click)="setMonth(m.value)">
      {{ m.label }}
    </ion-chip>
  </div>

  <!-- Filtro tipo -->
  <div class="filter-chips type-chips">
    <ion-chip [class.active]="activeFilter === 'all'"     (click)="setFilter('all')">Tutti</ion-chip>
    <ion-chip [class.active]="activeFilter === 'income'"  (click)="setFilter('income')">
      <ion-icon name="arrow-down-circle-outline" class="chip-icon income"></ion-icon>Entrate
    </ion-chip>
    <ion-chip [class.active]="activeFilter === 'expense'" (click)="setFilter('expense')">
      <ion-icon name="arrow-up-circle-outline" class="chip-icon expense"></ion-icon>Uscite
    </ion-chip>
    <ion-chip
      *ngFor="let cat of expenseCategories"
      [class.active]="activeCategoryId === cat.id"
      (click)="setCategory(cat.id)">
      {{ cat.emoji }} {{ cat.name }}
    </ion-chip>
  </div>

  <!-- Riepilogo filtrato -->
  <div class="filter-summary" *ngIf="filtered.length">
    <div class="summary-stat">
      <span class="ss-label">Entrate</span>
      <span class="ss-value num amount-positive">+{{ formatCurrency(totalIncome) }}</span>
    </div>
    <div class="summary-stat">
      <span class="ss-label">Uscite</span>
      <span class="ss-value num amount-negative">-{{ formatCurrency(totalExpense) }}</span>
    </div>
    <div class="summary-stat">
      <span class="ss-label">Saldo</span>
      <span class="ss-value num" [class.amount-positive]="totalFiltered >= 0" [class.amount-negative]="totalFiltered < 0">
        {{ totalFiltered >= 0 ? '+' : '' }}{{ formatCurrency(totalFiltered) }}
      </span>
    </div>
  </div>

  <!-- Lista -->
  <ion-list lines="none" *ngIf="filtered.length; else empty">
    <app-transaction-card
      *ngFor="let tx of filtered; trackBy: trackById"
      [transaction]="tx"
      (edited)="onEdit($event)"
      (deleted)="onDeleted($event)">
    </app-transaction-card>
  </ion-list>

  <ng-template #empty>
    <app-empty-state
      emoji="🔍"
      title="Nessun risultato"
      subtitle="Prova a modificare i filtri o aggiungi una nuova transazione"
      actionLabel="Aggiungi transazione"
      actionRoute="/tabs/add-transaction">
    </app-empty-state>
  </ng-template>

  <app-footer></app-footer>
</ion-content>
