<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" fill="clear">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Modifica budget' : 'Nuovo budget' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [disabled]="form.invalid" fill="solid" shape="round" color="primary">
        Salva
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [formGroup]="form" class="ion-padding">
  <ion-item class="form-item" lines="none">
    <ion-icon name="pricetag-outline" slot="start" color="medium"></ion-icon>
    <ion-select placeholder="Categoria" formControlName="categoryId" interface="action-sheet">
      <ion-select-option *ngFor="let cat of categories" [value]="cat.id">
        {{ cat.emoji }} {{ cat.name }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item class="form-item" lines="none">
    <ion-icon name="cash-outline" slot="start" color="medium"></ion-icon>
    <ion-input
      placeholder="Importo budget mensile (€)"
      type="number"
      inputmode="decimal"
      formControlName="amount"
      min="1">
    </ion-input>
  </ion-item>

  <ion-item class="form-item" lines="none">
    <ion-icon name="notifications-outline" slot="start" color="medium"></ion-icon>
    <ion-label>Allerta al {{ form.get('alertThreshold')?.value }}%</ion-label>
  </ion-item>
  <ion-range
    formControlName="alertThreshold"
    [min]="50" [max]="100" [step]="5"
    color="warning"
    style="padding: 0 20px 16px">
  </ion-range>

  <ion-button
    *ngIf="isEdit"
    expand="block"
    fill="outline"
    color="danger"
    (click)="delete()"
    style="margin-top:16px">
    <ion-icon name="trash-outline" slot="start"></ion-icon>
    Elimina budget
  </ion-button>
</ion-content>
